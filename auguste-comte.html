<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ đề 1: Auguste Comte - Xã Hội Học Đại Cương</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        /* MÀN HÌNH THIẾT LẬP */
        #setup-screen {
            background-color: #121216;
            border: 2px solid #6f42c1;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-top: 10vh;
            box-shadow: 0 8px 32px rgba(111, 66, 193, 0.2);
        }
        #setup-screen h1 { color: #b388ff; margin-bottom: 10px; }
        #setup-screen p { color: #b3b3b8; margin-bottom: 30px; }
        .setting-group {
            display: flex; align-items: center; justify-content: space-between;
            background: #1a1a24; padding: 15px 20px;
            border-radius: 8px; margin-bottom: 15px;
            border: 1px solid #3a2366; text-align: left;
        }
        input[type="number"] {
            width: 70px; padding: 8px; background: #0a0a0c; color: white;
            border: 1px solid #6f42c1; border-radius: 6px; text-align: center;
        }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .btn-start {
            display: inline-block; width: 100%; background-color: #6f42c1;
            color: white; font-size: 1.2rem; font-weight: 600;
            padding: 15px; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer;
        }

        /* MÀN HÌNH LÀM BÀI */
        #quiz-screen { display: none; padding-bottom: 50px; }
        .quiz-header {
            position: sticky; top: 0; background-color: rgba(10, 10, 12, 0.95);
            padding: 15px 0; border-bottom: 1px solid #3a2366;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .question-card {
            background-color: #121216; border: 1px solid #3a2366;
            border-radius: 12px; padding: 25px; margin-top: 25px;
        }
        .options { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .option-label {
            display: flex; align-items: center; gap: 15px; background: #1a1a24;
            padding: 15px; border-radius: 8px; border: 1px solid #2a2a36; cursor: pointer;
        }
        .option-label.correct { border-color: #00e676; background: rgba(0, 230, 118, 0.15); color: #00e676; }
        .option-label.wrong { border-color: #ff5252; background: rgba(255, 82, 82, 0.15); color: #ff5252; }
        .option-label.disabled { pointer-events: none; }
        .explanation {
            margin-top: 20px; padding: 15px; background: rgba(111, 66, 193, 0.1);
            border-left: 4px solid #b388ff; display: none;
        }
        .btn-submit {
            display: block; width: 100%; max-width: 300px; margin: 40px auto 0;
            background-color: #00e676; color: #000; font-weight: 700;
            padding: 15px; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Bộ đề 1: Auguste Comte</h1>
        <div class="setting-group">
            <span>Tính thời gian</span>
            <div><input type="checkbox" id="enable-timer"> <input type="number" id="time-limit" value="30" disabled></div>
        </div>
        <div class="setting-group">
            <span>Hiện đáp án ngay</span> <input type="checkbox" id="instant-feedback" checked>
        </div>
        <button class="btn-start" onclick="startQuiz()">VÀO LÀM BÀI</button>
    </div>

    <div id="quiz-screen">
        <div class="quiz-header"><h2>Auguste Comte</h2><div id="timer-display"></div></div>
        <div id="questions-container"></div>
        <button id="submit-btn" class="btn-submit" onclick="submitQuiz()">NỘP BÀI</button>
    </div>
</div>

<script>
    const questionsData = [
        { q: "Câu 1. Auguste Comte sống trong giai đoạn nào?", opts: { A: "1760 – 1825", B: "1798 – 1857", C: "1818 – 1883", D: "1858 – 1917" }, ans: "B", exp: "Auguste Comte sinh năm 1798 và mất năm 1857." },
        // ... (Giữ nguyên dữ liệu 50 câu của bạn tại đây)
        { q: "Câu 50. Lý thuyết cấu trúc - chức năng sau này được gợi mở trực tiếp từ hướng nghiên cứu nào của Comte?", opts: { A: "Động học xã hội", B: "Tĩnh học xã hội", C: "Thực nghiệm xã hội", D: "Phân tích lịch sử" }, ans: "B", exp: "Ý tưởng được gợi mở từ hướng nghiên cứu tĩnh học xã hội của Auguste Comte." }
    ];

    let totalScore = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(isCorrect) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(isCorrect ? 660 : 150, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function startQuiz() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        const container = document.getElementById('questions-container');
        questionsData.forEach((q, index) => {
            container.innerHTML += `
                <div class="question-card" id="q-${index}">
                    <div class="question-title">${q.q}</div>
                    <div class="options">
                        ${Object.keys(q.opts).map(key => `
                            <label class="option-label" onclick="handleOptionClick(${index}, '${key}', this)">
                                <span><b>${key}.</b> ${q.opts[key]}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="explanation" id="exp-${index}"><b>Giải thích:</b> ${q.exp}</div>
                </div>`;
        });
    }

    function handleOptionClick(qIndex, selectedAns, el) {
        const card = document.getElementById(`q-${qIndex}`);
        if(card.classList.contains('answered')) return;
        card.classList.add('answered');

        const isInstant = document.getElementById('instant-feedback').checked;
        const correct = questionsData[qIndex].ans;

        if(isInstant) {
            el.classList.add(selectedAns === correct ? 'correct' : 'wrong');
            if(selectedAns !== correct) {
                Array.from(card.querySelectorAll('.option-label')).forEach(l => {
                    if(l.innerText.includes(correct)) l.classList.add('correct');
                });
            }
            playSound(selectedAns === correct);
            document.getElementById(`exp-${qIndex}`).style.display = 'block';
        } else {
            el.style.backgroundColor = '#6f42c1';
            el.dataset.selected = selectedAns;
        }
    }

    function submitQuiz() {
        questionsData.forEach((q, i) => {
            const card = document.getElementById(`q-${i}`);
            const selected = card.querySelector('[data-selected]');
            const correct = q.ans;
            if(selected) {
                const isCorrect = selected.dataset.selected === correct;
                selected.classList.add(isCorrect ? 'correct' : 'wrong');
                if(!isCorrect) card.querySelectorAll('.option-label').forEach(l => {
                    if(l.innerText.includes(correct)) l.classList.add('correct');
                });
            }
            document.getElementById(`exp-${i}`).style.display = 'block';
        });
    }
</script>
</body>
</html>
