<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm Bài Tập Trắc Nghiệm</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { align-items: flex-start; padding: 40px 20px; }
        .container { max-width: 800px; text-align: left; }
        .config-box { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--border-color); }
        .config-row { display: table; width: 100%; margin-bottom: 10px; }
        .config-cell { display: table-cell; vertical-align: middle; }
        .timer-badge { font-size: 1.3rem; font-weight: bold; color: #ff5252; text-align: right; }
        .difficulty-badge { background: #ffb300; color: #000; padding: 3px 8px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; }
        
        .quiz-item { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--border-color); }
        .quiz-item.correct-item { border-left-color: #4caf50; }
        .quiz-item.wrong-item { border-left-color: #f44336; }
        
        .question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }
        .ans-option { display: block; padding: 10px; margin: 5px 0; background: #2a2a2a; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .ans-option:hover { background: #333; }
        
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); vertical-align: middle; }
        .explain-box { display: none; background: #2e3d30; padding: 12px; border-radius: 6px; margin-top: 15px; border: 1px solid #4caf50; font-size: 0.95rem; }
        
        /* Màu trạng thái đúng sai */
        .ans-correct { background: #2e7d32 !important; color: #fff; }
        .ans-wrong { background: #c62828 !important; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="quiz-title">ĐANG TẢI...</h1>
        <div style="margin-bottom: 20px;">
            <span class="difficulty-badge" id="diff-tag">MỨC ĐỘ: -</span>
        </div>

        <div class="config-box" id="config-area">
            <div class="config-row">
                <div class="config-cell">
                    <label><b>Cách hiện đáp án:</b></label><br>
                    <input type="radio" name="view-mode" value="immediate" checked> Hiện ngay khi chọn<br>
                    <input type="radio" name="view-mode" value="submit"> Hiện sau khi nộp bài
                </div>
                <div class="config-cell">
                    <label><b>Thời gian làm bài:</b></label><br>
                    <input type="radio" name="time-mode" value="free" checked> Không giới hạn (Đếm xuôi)<br>
                    <input type="radio" name="time-mode" value="limit"> Giới hạn 15 phút (Đếm ngược)
                </div>
            </div>
            <button id="btn-start" class="btn" style="margin: 10px 0 0 0;">BẮT ĐẦU LÀM BÀI</button>
        </div>

        <div style="display: table; width: 100%; margin-bottom: 20px;">
            <div style="display: table-cell;" id="status-text"></div>
            <div style="display: table-cell;" class="timer-badge" id="timer-display">00:00</div>
        </div>

        <div id="quiz-container" style="display:none;"></div>

        <button id="btn-submit" class="btn btn-disabled" style="display:none;" disabled>NỘP BÀI CHẤM ĐIỂM</button>
    </div>

    <script src="data.js"></script>
    <script>
        const bd = sessionStorage.getItem('selected_bode') || 1;
        const ch = sessionStorage.getItem('selected_chuong') || 2;
        const dataKey = `bode${bd}_chuong2`; // Match key động

        const currentQuiz = QUIZ_DATA.questions[dataKey];
        let questionsList = [...currentQuiz.list];
        let timerInterval;
        let secondsPassed = 0;
        let secondsLeft = 15 * 60;
        let isStarted = false;
        let viewMode = 'immediate';
        let timeMode = 'free';

        // Tiêu đề trang
        document.getElementById('quiz-title').textContent = `${QUIZ_DATA.bode[bd].name} - ${QUIZ_DATA.chuong[ch].name}`;
        document.getElementById('diff-tag').textContent = `MỨC ĐỘ: ${currentQuiz.difficulty}`;

        // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Render câu hỏi ra giao diện
        function renderQuiz() {
            shuffle(questionsList); // Xáo trộn danh sách câu hỏi
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            questionsList.forEach((q, index) => {
                const qItem = document.createElement('div');
                qItem.className = 'quiz-item';
                qItem.id = `q-box-${q.id}`;

                let html = `<div class="question-text">Câu ${index + 1}: ${q.question}</div>`;
                
                // Trích xuất các đáp án và xáo trộn thứ tự hiển thị đáp án nếu muốn
                Object.keys(q.answers).forEach(key => {
                    html += `
                        <label class="ans-option" id="label-${q.id}-${key}">
                            <input type="radio" name="ans-${q.id}" value="${key}" data-qid="${q.id}">
                            <b>${key}.</b> ${q.answers[key]}
                        </label>
                    `;
                });

                html += `<div class="explain-box" id="explain-${q.id}"><b>Đáp án đúng: ${q.correct}</b><br><i>Giải thích:</i> ${q.explain}</div>`;
                qItem.innerHTML = html;
                container.appendChild(qItem);
            });

            // Gắn sự kiện click lựa chọn đáp án
            document.querySelectorAll('input[type="radio"][data-qid]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(!isStarted) return;
                    const qid = e.target.getAttribute('data-qid');
                    if (viewMode === 'immediate') {
                        checkAnswerImmediate(qid);
                    }
                });
            });
        }

        // Bắt đầu làm bài
        document.getElementById('btn-start').addEventListener('click', () => {
            isStarted = true;
            viewMode = document.querySelector('input[name="view-mode"]:checked').value;
            timeMode = document.querySelector('input[name="time-mode"]:checked').value;

            // Khóa (disable) cấu hình
            document.querySelectorAll('#config-area input, #config-area button').forEach(el => el.disabled = true);
            document.getElementById('config-area').style.opacity = '0.5';

            // Hiện câu hỏi & nút nộp bài
            document.getElementById('quiz-container').style.display = 'block';
            const submitBtn = document.getElementById('btn-submit');
            submitBtn.style.display = 'block';
            submitBtn.className = 'btn';
            submitBtn.disabled = false;

            renderQuiz();
            startTimer();
        });

        // Xử lý thời gian
        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeMode === 'free') {
                    secondsPassed++;
                    document.getElementById('timer-display').textContent = formatTime(secondsPassed);
                    document.getElementById('timer-display').style.color = '#86fcaa';
                } else {
                    secondsLeft--;
                    document.getElementById('timer-display').textContent = formatTime(secondsLeft);
                    if(secondsLeft <= 0) {
                        clearInterval(timerInterval);
                        alert('Hết giờ làm bài!');
                        submitQuiz();
                    }
                }
            }, 1000);
        }

        function formatTime(sec) {
            let m = Math.floor(sec / 60).toString().padStart(2, '0');
            let s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Chấm điểm ngay lập tức (Chế độ hiện đáp án ngay)
        function checkAnswerImmediate(qid) {
            const q = questionsList.find(item => item.id == qid);
            const selected = document.querySelector(`input[name="ans-${qid}"]:checked`).value;
            
            // Khóa không cho chọn lại câu này
            document.querySelectorAll(`input[name="ans-${qid}"]`).forEach(el => el.disabled = true);

            const box = document.getElementById(`q-box-${qid}`);
            if(selected === q.correct) {
                box.className = 'quiz-item correct-item';
                document.getElementById(`label-${qid}-${selected}`).classList.add('ans-correct');
            } else {
                box.className = 'quiz-item wrong-item';
                document.getElementById(`label-${qid}-${selected}`).classList.add('ans-wrong');
                document.getElementById(`label-${qid}-${q.correct}`).classList.add('ans-correct');
            }
            document.getElementById(`explain-${qid}`).style.display = 'block';
        }

        // Nộp bài (Chấm điểm hàng loạt)
        document.getElementById('btn-submit').addEventListener('click', submitQuiz);

        function submitQuiz() {
            clearInterval(timerInterval);
            isStarted = false;
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-submit').className = 'btn btn-disabled';

            let score = 0;

            questionsList.forEach(q => {
                // Khóa tất cả các nút radio
                document.querySelectorAll(`input[name="ans-${q.id}"]`).forEach(el => el.disabled = true);
                
                const selectedRadio = document.querySelector(`input[name="ans-${q.id}"]:checked`);
                const selected = selectedRadio ? selectedRadio.value : null;
                const box = document.getElementById(`q-box-${q.id}`);

                if(selected === q.correct) {
                    score++;
                    box.className = 'quiz-item correct-item';
                    if(selected) document.getElementById(`label-${q.id}-${selected}`).classList.add('ans-correct');
                } else {
                    box.className = 'quiz-item wrong-item';
                    if(selected) document.getElementById(`label-${q.id}-${selected}`).classList.add('ans-wrong');
                    document.getElementById(`label-${q.id}-${q.correct}`).classList.add('ans-correct');
                }

                // Hiện giải thích cho toàn bộ câu hỏi
                document.getElementById(`explain-${q.id}`).style.display = 'block';
            });

            // Hiện kết quả điểm số
            document.getElementById('status-text').innerHTML = `<h3>KẾT QUẢ: ${score}/${questionsList.length} câu đúng!</h3>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
